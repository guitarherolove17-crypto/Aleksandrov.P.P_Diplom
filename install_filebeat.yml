---
- hosts: "webservers"
  vars:
    ansible_ssh_user: user
    elasticsearch_host: "10.0.2.32"   # IP Elasticsearch
    elasticsearch_port: 9200

  become: true

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

  tasks:
    - name: Install prerequisites
      apt:
        name:
          - apt-transport-https
          - wget
        state: present

    - name: Remove official Elastic repository (if any)
      file:
        path: /etc/apt/sources.list.d/elastic-8.x.list
        state: absent
      ignore_errors: yes

    - name: Add Filebeat repository from Yandex mirror
      apt_repository:
        repo: "deb [trusted=yes] https://mirror.yandex.ru/mirrors/elastic/8/ stable main"
        state: present
        update_cache: yes

    - name: Install Filebeat
      apt:
        name: filebeat
        state: present

    - name: Enable Nginx module for Filebeat
      command: filebeat modules enable nginx
      args:
        creates: /etc/filebeat/modules.d/nginx.yml
      notify: restart filebeat

    - name: Configure Filebeat
      template:
        src: filebeat.yml.j2
        dest: /etc/filebeat/filebeat.yml
        owner: root
        group: root
        mode: '0644'
      notify: restart filebeat

    - name: Start and enable Filebeat
      service:
        name: filebeat
        state: started
        enabled: yes

  handlers:
    - name: restart filebeat
      service:
        name: filebeat
        state: restarted