---
- hosts: "webservers"
  vars:
    ansible_ssh_user: user
  become: true

  pre_tasks:
    - name: Validating the ssh port is open
      wait_for:
        host: "{{ (ansible_ssh_host|default(ansible_host))|default(inventory_hostname) }}"
        port: 22
        delay: 5
        timeout: 300
        state: started
        search_regex: OpenSSH

  tasks:
    - name: Stop nginx service if running
      service:
        name: nginx
        state: stopped
      ignore_errors: yes

    - name: Forcefully remove broken nginx packages using dpkg
      shell: |
        dpkg --remove --force-remove-reinstreq nginx nginx-common nginx-core
      args:
        warn: no
      ignore_errors: yes

    - name: Clean up apt cache and fix broken dependencies
      apt:
        update_cache: yes
        autoclean: yes
        autoremove: yes

    - name: Purge any remaining nginx packages
      apt:
        name: "{{ item }}"
        state: absent
        purge: yes
      loop:
        - nginx
        - nginx-common
        - nginx-core
        - nginx-full
        - nginx-light
        - nginx-extras
      ignore_errors: yes

    - name: Remove nginx directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nginx
        - /var/log/nginx
        - /var/cache/nginx
        - /var/lib/nginx
        - /usr/share/nginx

    - name: Ensure dpkg is in a clean state
      command: dpkg --configure -a
      ignore_errors: yes

    - name: Final apt fix (force broken installs)
      shell: apt-get install -f -y
      # параметр warn: no убран или оставлен только для shell