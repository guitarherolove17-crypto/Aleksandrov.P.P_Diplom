---
- hosts: "elasticsearch"
  vars:
    ansible_ssh_user: user
    es_version: "8.x"  # Используем основную ветку
    es_cluster_name: "my-cluster"
    es_node_name: "node-1"
    es_network_host: "0.0.0.0"
    es_http_port: 9200
    es_xpack_security_enabled: false
    es_install_dir: "/usr/share/elasticsearch"

  become: true

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

  tasks:
    - name: Install prerequisites
      apt:
        name:
          - apt-transport-https
          - wget
          - openjdk-17-jre-headless
        state: present

    - name: Remove official Elasticsearch repository
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/elastic-8.x.list
        - /etc/apt/sources.list.d/elasticsearch-8.x.list
      ignore_errors: yes

    - name: Add Elasticsearch repository from Yandex mirror
      apt_repository:
        repo: "deb [trusted=yes] https://mirror.yandex.ru/mirrors/elastic/8/ stable main"
        state: present
        update_cache: yes

    - name: Install Elasticsearch
      apt:
        name: elasticsearch
        state: present

    - name: Configure Elasticsearch
      template:
        src: elasticsearch.yml.j2
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: elasticsearch
        mode: '0644'
      notify: restart elasticsearch

    - name: Set JVM heap size
      lineinfile:
        path: /etc/elasticsearch/jvm.options
        regexp: "^-Xms"
        line: "-Xms512m"
      notify: restart elasticsearch

    - name: Set JVM max heap size
      lineinfile:
        path: /etc/elasticsearch/jvm.options
        regexp: "^-Xmx"
        line: "-Xmx512m"
      notify: restart elasticsearch

    - name: Start and enable Elasticsearch
      service:
        name: elasticsearch
        state: started
        enabled: yes

  handlers:
    - name: restart elasticsearch
      service:
        name: elasticsearch
        state: restarted